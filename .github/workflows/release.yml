name: Release

on:
  push:
    tags:
    - '*'

env:
  PLUGIN_NAME: zotero-bridge

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      # create the GitHub release
      contents: write
      # OIDC token for npm trusted publishing
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        # npm >= 11.5.1 is required for trusted publishing
        node-version: '24.x'
        registry-url: 'https://registry.npmjs.org'
    - name: Update npm
      run: npm install -g npm@latest

    - name: Build
      run: |
        npm install
        npm run build
        mkdir ${{ env.PLUGIN_NAME }}
        cp main.js manifest.json styles.css ${{ env.PLUGIN_NAME }}
        zip -r ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip ${{ env.PLUGIN_NAME }}

    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ASSETS="main.js manifest.json styles.css ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip"
        gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --verify-tag $ASSETS \
          || gh release upload "${{ github.ref_name }}" $ASSETS --clobber

    # Runs last so a registry/auth problem can never block the GitHub
    # release, which is what Obsidian installs plugins from.
    # Authenticated via npm trusted publishing (OIDC) — no token secret.
    - name: Publish to npm
      run: npm publish --access public
